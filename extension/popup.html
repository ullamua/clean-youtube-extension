<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="header">
    <div class="brand">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 14a3.5 3.5 0 0 0 5 0l3-3a3.5 3.5 0 0 0-5-5l-1.5 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 10a3.5 3.5 0 0 0-5 0l-3 3a3.5 3.5 0 0 0 5 5l1.5-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>YT Clean Link</h1>
        <span class="brand-sub">Share YouTube without the noise</span>
      </div>
    </div>
    <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main id="mainView">
    <div id="noVideo" class="empty-state" style="display:none;">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="6" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="m10 11 4 2.5L10 16v-5Z" fill="currentColor"/>
          <path d="M7 3l2 3M17 3l-2 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>No video detected</h3>
      <p>Open a YouTube video or Short, then click<br>the extension icon to generate a clean link.</p>
    </div>

    <div id="videoView" style="display:none;">
      <div class="video-card">
        <div class="video-thumb" id="videoThumb"></div>
        <div class="video-meta">
          <div class="video-title" id="videoTitle">Loading…</div>
          <div class="video-channel" id="videoUrl"></div>
        </div>
      </div>

      <div class="field">
        <div class="field-head">
          <span class="field-label">Quality</span>
          <span class="field-hint" id="qualityHint">Best available</span>
        </div>
        <div class="chip-grid quality-grid">
          <button class="chip" data-quality="360">360p</button>
          <button class="chip" data-quality="480">480p</button>
          <button class="chip" data-quality="720">720p</button>
          <button class="chip" data-quality="1080">1080p</button>
          <button class="chip active" data-quality="best">Best</button>
        </div>
      </div>

      <div class="field">
        <div class="field-head">
          <span class="field-label">Link expires in</span>
          <span class="field-hint" id="expireHint">30 minutes</span>
        </div>
        <div class="chip-grid expire-grid">
          <button class="chip" data-minutes="5">5 min</button>
          <button class="chip active" data-minutes="30">30 min</button>
          <button class="chip" data-minutes="60">1 hour</button>
          <button class="chip" data-minutes="1440">24 hrs</button>
          <button class="chip danger-chip" data-minutes="0">Never</button>
        </div>
      </div>

      <div class="never-warn" id="neverWarn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
          <path d="M12 9v4m0 4h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Permanent links keep using server bandwidth. Use sparingly.</span>
      </div>

      <button class="primary-btn" id="generateBtn">
        <span class="btn-content">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
            <path d="m13 2-3 7h7l-9 13 3-9H4l9-11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Generate Clean Link
        </span>
      </button>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="result-head">
          <span class="result-pill">
            <span class="dot"></span>
            Ready to share
          </span>
          <span class="result-meta" id="resultMeta"></span>
        </div>
        <div class="result-filename" id="resultTitle" style="display:none;"></div>
        <div class="result-url" id="resultUrl"></div>
        <div class="result-actions">
          <button class="primary-btn compact" id="copyBtn">
            <span class="btn-content">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
                <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
              </svg>
              Copy
            </span>
          </button>
          <button class="ghost-btn" id="openBtn">
            <span class="btn-content">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Open
            </span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span id="backendStatus" class="backend-status">
      <span class="status-dot"></span>
      <span id="backendLabel">backend</span>
    </span>
    <span id="cookieStatus" class="cookie-badge"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
