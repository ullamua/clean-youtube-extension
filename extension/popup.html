<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header .logo { font-size: 24px; }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #cba6f7;
    }
    .header .settings {
      margin-left: auto;
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 16px;
    }
    .header .settings:hover { color: #cba6f7; }

    .video-title {
      background: #313244;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #a6adc8;
      line-height: 1.4;
      max-height: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c7086;
      margin-bottom: 8px;
    }

    .expire-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .expire-btn {
      background: #313244;
      border: 2px solid transparent;
      border-radius: 8px;
      color: #cdd6f4;
      padding: 8px 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .expire-btn:hover { background: #45475a; }
    .expire-btn.active {
      border-color: #cba6f7;
      background: rgba(203,166,247,0.12);
      color: #cba6f7;
    }
    .expire-btn.danger {
      border-color: #f38ba8;
      background: rgba(243,139,168,0.12);
      color: #f38ba8;
    }
    .never-warn {
      background: rgba(243,139,168,0.1);
      border: 1px solid rgba(243,139,168,0.3);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
      font-size: 11px;
      color: #f38ba8;
      display: none;
    }

    .generate-btn {
      width: 100%;
      padding: 12px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .generate-btn:hover { background: #b4befe; }
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .generate-btn.loading {
      position: relative;
      color: transparent;
    }
    .generate-btn.loading::after {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      top: 50%; left: 50%;
      margin: -9px 0 0 -9px;
      border: 2px solid #1e1e2e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 14px;
      display: none;
    }
    .result-url {
      background: #313244;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #89b4fa;
      word-break: break-all;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .result-actions {
      display: flex;
      gap: 8px;
    }
    .result-actions button {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn {
      background: #cba6f7;
      color: #1e1e2e;
    }
    .copy-btn:hover { background: #b4befe; }
    .open-btn {
      background: #313244;
      color: #cdd6f4;
    }
    .open-btn:hover { background: #45475a; }

    .result-meta {
      font-size: 11px;
      color: #6c7086;
      margin-top: 8px;
    }

    .error {
      background: rgba(243,139,168,0.1);
      border: 1px solid rgba(243,139,168,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 12px;
      font-size: 12px;
      color: #f38ba8;
      display: none;
    }

    .toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(-40px);
      background: #313244;
      color: #a6e3a1;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s ease;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .no-video {
      text-align: center;
      padding: 30px 10px;
      color: #6c7086;
    }
    .no-video .icon { font-size: 32px; margin-bottom: 10px; }
    .no-video p { font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="header">
    <span class="logo">🔗</span>
    <h1>YT Clean Link</h1>
    <button class="settings" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div id="mainView">
    <div id="noVideo" class="no-video" style="display:none;">
      <div class="icon">📺</div>
      <p>Navigate to a YouTube video<br>to generate a clean link</p>
    </div>

    <div id="videoView" style="display:none;">
      <div class="video-title" id="videoTitle">Loading...</div>

      <div class="section-label">Link expiration</div>
      <div class="expire-grid">
        <button class="expire-btn" data-minutes="5">5 min</button>
        <button class="expire-btn active" data-minutes="30">30 min</button>
        <button class="expire-btn" data-minutes="60">1 hour</button>
        <button class="expire-btn" data-minutes="1440">24 hours</button>
        <button class="expire-btn" data-minutes="0">NEVER</button>
      </div>

      <div class="never-warn" id="neverWarn">
        ⚠️ Links that never expire use significant bandwidth. Use sparingly!
      </div>

      <button class="generate-btn" id="generateBtn">Generate Clean MP4 Link</button>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="result-url" id="resultUrl"></div>
        <div class="result-actions">
          <button class="copy-btn" id="copyBtn">📋 Copy Link</button>
          <button class="open-btn" id="openBtn">🔗 Open</button>
        </div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
