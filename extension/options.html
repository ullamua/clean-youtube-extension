<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YT Clean Link — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #181825;
      border-radius: 16px;
      padding: 32px;
      width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 20px;
      color: #cba6f7;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #6c7086;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #a6adc8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #313244;
      border: 2px solid #45475a;
      border-radius: 10px;
      color: #cdd6f4;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #cba6f7; }
    .help {
      font-size: 11px;
      color: #6c7086;
      margin-top: 6px;
      line-height: 1.5;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .save-btn { background: #cba6f7; color: #1e1e2e; }
    .save-btn:hover { background: #b4befe; }
    .reset-btn { background: #313244; color: #cdd6f4; }
    .reset-btn:hover { background: #45475a; }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #a6e3a1;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 YT Clean Link Settings</h1>
    <p class="subtitle">Configure your backend proxy server</p>

    <label for="backendUrl">Backend URL</label>
    <input type="url" id="backendUrl" placeholder="http://localhost:8000">
    <p class="help">
      The URL of your YT Clean Proxy backend.<br>
      Default: <code style="color:#89b4fa">http://localhost:8000</code>
    </p>

    <div class="actions">
      <button class="save-btn" id="saveBtn">Save</button>
      <button class="reset-btn" id="resetBtn">Reset to Default</button>
    </div>
    <div class="status" id="status">✅ Settings saved!</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
